name: Qodana dotnet native (Windows, no Java)

on:
  workflow_dispatch:

jobs:
  qodana-native-windows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download qodana-cli nightly
        run: |
          curl -L -o qodana https://github.com/JetBrains/qodana-cli/releases/download/v2026.1-nightly/qodana_linux_x86_64
          chmod +x qodana
          ./qodana --version

      - name: qodana scan (Docker mode)
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        run: |
          ./qodana scan \
            --linter qodana-cdnet \
            --within-docker true \
            --save-report \
            -i . \
            -o "$RUNNER_TEMP/qodana-results"

      - name: qodana send
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        run: |
          ./qodana send \
            -i . \
            -o "$RUNNER_TEMP/qodana-results"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-results
          path: ${{ runner.temp }}/qodana-results/
