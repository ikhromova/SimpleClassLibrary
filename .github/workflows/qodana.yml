name: Qodana Scan

on:
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      checks: write
    env:
      ORG_GRADLE_PROJECT_ghUsername: testGHUser
      ORG_GRADLE_PROJECT_ghPassword: testGH
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Qodana Scan"
        uses: JetBrains/qodana-action@v2025.2
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          upload-result: false
          args: |
            --linter,qodana-cdnet,
            --within-docker,true